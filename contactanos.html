<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactanos</title>
    <link rel="stylesheet" href="formularios.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="/index.html" target="_blank" >Menu principal</a></li>
        </ul>
    </nav>
     <section id="formulario">
            <h2>Formulario de Contacto</h2>
            <div id="formu">
            <form action="/tabla.html" method="post">
                <label for="">Nombre:</label>
                <input type="text">
                <br>
                <label for="">Apellidos:</label>
                <input type="text">
                <br>
                <label for="">Ciudad:</label>
                <input type="text">
                <br>
                <label for="">Edad:</label>
                <input type="number" name="" id="">
                <br>
                <label for="">Correo:</label>
                <input type="email" name="" id="" placeholder="Ingrese su correo">
                <br>
                <label for="">Numero Telefonico:</label>
                <input type="text">
                <!--RADIO BUTTON
                Permiten escojer solo 1 opcion siempre
                y cuando se encuentren en la misma clase-->
                <br>
                <p>Seleccione su genero:</p>
                <div id="genero">
                <input type="radio" name="sexo" id="" value="m"> Masculino
                <br>
                <input type="radio" name="sexo" id="" value="f"> Femenino
                <br>
                </div>
                <div id="Enviar">
                <input type="submit" value="Enviar">
                </div>   
            </form>
            </div>
    </section>

 <footer class="footer">

</html>
